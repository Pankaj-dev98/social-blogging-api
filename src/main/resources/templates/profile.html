<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="shell profile-shell">
    <header class="topbar">
        <div>
            <a class="back-link" href="/">Back to home</a>
            <h1>My profile</h1>
            <p id="profile-subtitle" class="muted"></p>
        </div>
        <div class="topbar-actions">
            <button id="profile-signout-button" type="button" class="secondary">Sign out</button>
        </div>
    </header>

    <div id="profile-feedback" class="notice" role="status" hidden></div>

    <section id="profile-content" class="profile-layout" hidden>
        <article class="panel profile-card">
            <h2 id="profile-name"></h2>
            <dl class="detail-list">
                <div>
                    <dt>Email</dt>
                    <dd id="profile-email"></dd>
                </div>
                <div>
                    <dt>Published posts</dt>
                    <dd id="profile-post-count"></dd>
                </div>
                <div>
                    <dt>Followers</dt>
                    <dd id="profile-follower-count"></dd>
                </div>
            </dl>
        </article>

        <article class="panel">
            <div class="panel-heading">
                <h2>My posts</h2>
                <button id="refresh-profile-posts" type="button" class="secondary">Refresh</button>
            </div>
            <div id="profile-posts-list" class="post-list"></div>
        </article>
    </section>
</main>

<script th:src="@{/js/profile.js}" src="/js/profile.js"></script>
</body>
</html>
